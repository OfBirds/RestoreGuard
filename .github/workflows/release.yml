# Release pipeline: push a tag like v0.2.0 and get self-contained binaries for
# every platform, a .deb for amd64/arm64, checksums, and a GitHub Release.
# No .NET is required on user machines — binaries are fully self-contained.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write # NuGet.org trusted publishing (OIDC) — see the NuGet push step

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/ofbirds/restoreguard:${{ github.ref_name }}
            ghcr.io/ofbirds/restoreguard:latest

  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags: release notes are built from the commit log

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Test
        run: dotnet test RestoreGuard.slnx -c Release

      - name: Publish all platforms
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64 win-x64; do
            dotnet publish src/RestoreGuard.Cli -c Release -r "$rid" --self-contained \
              -p:PublishSingleFile=true -o "publish/$rid"
            if [ "$rid" = "win-x64" ]; then
              cp "publish/$rid/RestoreGuard.Cli.exe" "publish/$rid/restoreguard.exe"
              (cd "publish/$rid" && zip -q "../../dist/restoreguard-$VERSION-$rid.zip" restoreguard.exe)
            else
              cp "publish/$rid/RestoreGuard.Cli" "publish/$rid/restoreguard"
              tar -czf "dist/restoreguard-$VERSION-$rid.tar.gz" -C "publish/$rid" restoreguard
            fi
          done

      - name: Build debs
        run: |
          set -eu
          VERSION="${GITHUB_REF_NAME#v}"
          bash scripts/build-deb.sh publish/linux-x64/restoreguard "$VERSION" amd64 dist
          bash scripts/build-deb.sh publish/linux-arm64/restoreguard "$VERSION" arm64 dist

      - name: Checksums
        run: (cd dist && sha256sum * > SHA256SUMS.txt)

      - name: Pack dotnet tool
        run: dotnet pack src/RestoreGuard.Cli -c Release -o dist

      # NuGet.org trusted publishing (OIDC): no long-lived secret. The login
      # action exchanges the workflow's short-lived OIDC token for a temporary
      # API key, authorized by the trusted-publishing policy on nuget.org
      # (owner 3fun, repo OfBirds/RestoreGuard, workflow release.yml).
      - name: NuGet trusted-publishing login
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: 3fun
      - name: Push to NuGet
        run: dotnet nuget push dist/*.nupkg --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      # Plain `gh` instead of a third-party action — survives strict org
      # Actions allowlists (github-owned + verified + docker/* only).
      # Notes = the commit log since the previous tag (we commit directly, so
      # --generate-notes would yield only a bare compare link).
      - name: GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prev=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          {
            echo "## Changes since ${prev:-the beginning}"
            git log --format='- %s' ${prev:+$prev..}"$GITHUB_REF_NAME"
            echo
            echo "**Full Changelog**: https://github.com/OfBirds/RestoreGuard/compare/${prev:+$prev...}$GITHUB_REF_NAME"
          } > notes.md
          # Idempotent: a re-created tag (e.g. after a history rewrite) re-triggers
          # this workflow, and `gh release create` refuses if the release exists —
          # replace it so the release always matches the CURRENT tag's build.
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            gh release delete "$GITHUB_REF_NAME" --yes
          fi
          gh release create "$GITHUB_REF_NAME" dist/* --title "$GITHUB_REF_NAME" --notes-file notes.md --verify-tag
