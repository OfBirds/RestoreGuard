version: 2
updates:
  # GitHub Actions used by ci.yml / release.yml (also clears the recurring
  # Node.js runtime-deprecation warnings as action majors are bumped).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: ci

  # NuGet dependencies across the solution.
  - package-ecosystem: nuget
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: deps
    groups:
      # One PR for routine bumps instead of many.
      nuget:
        patterns: ["*"]
        update-types: ["minor", "patch"]
